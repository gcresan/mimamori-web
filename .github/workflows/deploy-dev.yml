name: Deploy to Dev

on:
  push:
    branches: [main]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 162.43.35.237 >> ~/.ssh/known_hosts

      - name: Deploy theme via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.sass-cache' \
            --exclude='.DS_Store' \
            --exclude='config.rb' \
            --exclude='/plugins' \
            ./ root@162.43.35.237:/home/kusanagi/mimamori-dev/DocumentRoot/wp-content/themes/mimamori/

      - name: Cleanup stale plugin path (one-time)
        run: |
          # 過去デプロイの誤配置を削除: themes/mimamori/plugins/ にあった旧コピーを消す
          ssh root@162.43.35.237 'rm -rf /home/kusanagi/mimamori-dev/DocumentRoot/wp-content/themes/mimamori/plugins'

      - name: Deploy mimamori-chatbot plugin
        run: |
          # mimamori-chatbot プラグインを wp-content/plugins/ 直下に配置する。
          # --delete はターゲットサブディレクトリ内のみ作用するので、他のプラグイン (mw-wp-form等) には影響しない。
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.DS_Store' \
            --exclude='vendor/.git' \
            ./plugins/mimamori-chatbot/ root@162.43.35.237:/home/kusanagi/mimamori-dev/DocumentRoot/wp-content/plugins/mimamori-chatbot/

      - name: Setup scripts symlinks
        run: |
          ssh root@162.43.35.237 'bash -s' <<'REMOTE'
          THEME_SCRIPTS="/home/kusanagi/mimamori-dev/DocumentRoot/wp-content/themes/mimamori/scripts"
          DEST="/home/kusanagi/mimamori-dev/scripts"
          mkdir -p "$DEST"
          for f in "$THEME_SCRIPTS"/*.sh; do
            name=$(basename "$f")
            ln -sf "$f" "$DEST/$name"
            chmod +x "$f"
          done
          REMOTE

      - name: Flush OPcache and WordPress caches
        # KUSANAGI の OPcache に PHP の旧バイトコードが残ったままになるのを防ぐ。
        # 加えて WordPress の object cache (transients を含む) もまとめてフラッシュ。
        run: |
          ssh root@162.43.35.237 'bash -s' <<'REMOTE'
          set -e
          # PHP-FPM を reload して OPcache を破棄させる (KUSANAGI標準: php-fpm@php8.x)
          systemctl reload 'php-fpm@*' 2>/dev/null || systemctl restart 'php-fpm@*' 2>/dev/null || \
            systemctl restart php-fpm 2>/dev/null || true
          # WordPress の object cache をフラッシュ
          sudo -u kusanagi /opt/kusanagi/php/bin/php /opt/kusanagi/bin/wp \
            cache flush --path=/home/kusanagi/mimamori-dev/DocumentRoot 2>/dev/null || true
          # KUSANAGI bcache (ページキャッシュ) が有効ならフラッシュ
          kusanagi bcache flush mimamori-dev 2>/dev/null || true
          REMOTE
